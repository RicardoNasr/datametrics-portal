<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DataMetrics — Client Portal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                   'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #202223;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-card {
      background: #ffffff;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .brand {
      text-align: center;
      margin-bottom: 28px;
    }
    .brand h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a2e;
      letter-spacing: -0.3px;
    }
    .brand p {
      font-size: 13px;
      color: #6d7175;
      margin-top: 4px;
    }
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 11px 14px;
      font-size: 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field input:focus {
      border-color: #1a1a2e;
      box-shadow: 0 0 0 3px rgba(26,26,46,0.1);
    }
    .btn {
      width: 100%;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      color: #ffffff;
      background: #1a1a2e;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }
    .btn:hover { background: #16213e; }
    .btn:disabled { background: #6d7175; cursor: wait; }
    .error {
      display: none;
      background: #fef2f2;
      color: #b91c1c;
      font-size: 13px;
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      border: 1px solid #fecaca;
    }
    .error.visible { display: block; }
    .footer {
      text-align: center;
      font-size: 12px;
      color: #9ca3af;
      margin-top: 22px;
    }
    .footer a { color: #6b7280; text-decoration: none; }
  </style>
</head>
<body>
  <div class="login-card" id="login-card">
    <div class="brand">
      <h1>DataMetrics</h1>
      <p>Sign in to your analytics dashboard</p>
    </div>

    <div class="error" id="errorMsg"><span id="errorText"></span></div>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="slug">Account ID</label>
        <input type="text" id="slug" name="slug" autocomplete="username"
               placeholder="your-account-id" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               autocomplete="current-password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn" id="submitBtn">Sign in</button>
    </form>

    <div class="footer">
      Need access? <a href="mailto:ricardo.nasr15@gmail.com">Contact us</a>
    </div>
  </div>

  <script>
    // ====================================================================
    //  1. MAGIC-TOKEN AUTO-LOGIN
    //     If the URL has ?magic=TOKEN (from the Shopify embedded app's
    //     "Open Dashboard" button or the demo link), exchange it for a
    //     signed Metabase URL and redirect. Otherwise fall through to the
    //     normal login form below.
    // ====================================================================
    (async function autoLoginFromMagicToken() {
      const params = new URLSearchParams(window.location.search);
      const magicToken = params.get('magic');
      if (!magicToken) return; // no magic → show the login form

      // Replace the card with a loading state while we redirect
      document.getElementById('login-card').innerHTML =
        '<div style="display:flex;align-items:center;justify-content:center;' +
        'min-height:120px;font-size:15px;color:#6b7280;">Opening your dashboard…</div>';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ magicToken })
        });
        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          // Hard error (bad/expired link token, server error)
          document.getElementById('login-card').innerHTML =
            '<div style="text-align:center;padding:8px;">' +
              '<div style="font-size:18px;font-weight:600;color:#1a1a2e;margin-bottom:8px;">' +
                'This link has expired</div>' +
              '<div style="font-size:14px;color:#6b7280;margin-bottom:16px;">' +
                'Return to your Shopify Admin and click <strong>Open Dashboard</strong> ' +
                'again to get a fresh link.</div>' +
              '<a href="/" style="color:#2563eb;text-decoration:none;font-size:14px;">' +
                '← Back to login</a>' +
            '</div>';
          return;
        }

        // Route every state through the /dashboard wrapper, which renders the
        // right page (ready → embed, preparing → "being prepared", expired →
        // "contact us"). The wrapper is always a controlled, non-blank page.
        const qs = new URLSearchParams({ state: data.state || 'preparing' });
        if (data.state === 'ready') {
          qs.set('embed', data.url);
          if (data.isDemo) qs.set('demo', '1');
        }
        if (data.state === 'expired') {
          qs.set('kind', data.expiredKind || 'trial');
        }
        window.location.replace('/dashboard?' + qs.toString());
      } catch (err) {
        document.getElementById('login-card').innerHTML =
          '<div style="text-align:center;padding:8px;font-size:14px;color:#374151;">' +
            'Connection error. Please refresh and try again.</div>';
      }
    })();

    // ====================================================================
    //  2. MANUAL LOGIN (slug + password)
    // ====================================================================
    const form = document.getElementById('loginForm');
    const btn = document.getElementById('submitBtn');
    const errorMsg = document.getElementById('errorMsg');
    const errorText = document.getElementById('errorText');

    function showError(msg) {
      errorText.textContent = msg;
      errorMsg.classList.add('visible');
    }
    function hideError() {
      errorMsg.classList.remove('visible');
    }
    function setLoading(loading) {
      btn.disabled = loading;
      btn.textContent = loading ? 'Signing in…' : 'Sign in';
    }

    // SHA-256 → hex, matching what /api/login expects for password_hash
    async function hashPassword(password) {
      const encoder = new TextEncoder();
      const data = encoder.encode(password);
      const hashBuffer = await crypto.subtle.digest('SHA-256', data);
      return Array.from(new Uint8Array(hashBuffer))
        .map(b => b.toString(16).padStart(2, '0'))
        .join('');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const slug = document.getElementById('slug').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      if (!slug || !password) return;

      setLoading(true);
      try {
        const passwordHash = await hashPassword(password);
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ slug, passwordHash })
        });
        const data = await res.json().catch(() => ({}));

        if (res.status === 401) {
          showError('Invalid account ID or password.');
          setLoading(false);
          return;
        }
        if (!res.ok) {
          showError('Connection error. Please try again.');
          setLoading(false);
          return;
        }

        // Route through the /dashboard wrapper, same as the magic flow.
        const qs = new URLSearchParams({ state: data.state || 'preparing' });
        if (data.state === 'ready') {
          qs.set('embed', data.url);
          if (data.isDemo) qs.set('demo', '1');
        }
        if (data.state === 'expired') {
          qs.set('kind', data.expiredKind || 'paid');
        }
        window.location.href = '/dashboard?' + qs.toString();
      } catch (err) {
        showError('Connection error. Please try again.');
        setLoading(false);
      }
    });
  </script>
</body>
</html>
