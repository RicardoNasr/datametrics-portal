<!--
========================================================================
  MAGIC-TOKEN AUTO-LOGIN
========================================================================
  Add this <script> block to public/index.html, right at the top of the
  existing <script> block (before any code that depends on form elements).

  Behavior:
  - URL contains ?magic=TOKEN  → POST to /api/login → redirect to dashboard
  - URL contains nothing       → show the normal login form
  - Invalid/expired magic      → show a friendly error message

  Use this for:
  - "Open Dashboard" button inside the Shopify embedded app
  - Demo dashboard link (use the long-lived DEMO_MAGIC_TOKEN)
========================================================================
-->
<script>
  (async function autoLoginFromMagicToken() {
    const params = new URLSearchParams(window.location.search);
    const magicToken = params.get('magic');
    if (!magicToken) return; // no magic param → normal login flow continues

    // Hide the login form while we redirect
    document.body.innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;' +
      'height:100vh;font-family:system-ui,-apple-system,sans-serif;color:#6b7280;' +
      'font-size:15px;">' +
      'Opening your dashboard…' +
      '</div>';

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ magicToken })
      });
      const data = await res.json().catch(() => ({}));

      if (!res.ok || !data.url) {
        document.body.innerHTML =
          '<div style="display:flex;flex-direction:column;align-items:center;' +
          'justify-content:center;height:100vh;font-family:system-ui,-apple-system,sans-serif;' +
          'color:#374151;gap:12px;padding:24px;text-align:center;">' +
            '<div style="font-size:20px;font-weight:600;">This link has expired</div>' +
            '<div style="font-size:14px;color:#6b7280;max-width:420px;">' +
              'Please return to your Shopify Admin and click ' +
              '<strong>Open Dashboard</strong> again to get a fresh link.' +
            '</div>' +
            '<a href="/" style="margin-top:16px;color:#2563eb;text-decoration:none;font-size:14px;">' +
              '← Back to login' +
            '</a>' +
          '</div>';
        return;
      }

      window.location.replace(data.url);
    } catch (err) {
      document.body.innerHTML =
        '<div style="display:flex;align-items:center;justify-content:center;' +
        'height:100vh;font-family:system-ui,-apple-system,sans-serif;color:#374151;">' +
          'Connection error. Please refresh and try again.' +
        '</div>';
    }
  })();
</script>
